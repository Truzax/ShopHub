<ng-container *ngIf="isAuthenticated">
<!-- Chat Widget Button -->
<button 
  class="fixed bottom-6 right-6 w-14 h-14 bg-[var(--primary)] hover:opacity-90 text-[var(--primary-foreground)] rounded-full shadow-lg shadow-[var(--primary)]/30 flex items-center justify-center transition-transform hover:scale-105 z-50 focus:outline-none"
  (click)="toggleChat()"
  [class.rotate-12]="!isOpen">
  <mat-icon *ngIf="!isOpen">smart_toy</mat-icon>
  <mat-icon *ngIf="isOpen">close</mat-icon>
</button>

<!-- Chat Window -->
<div 
  class="fixed bottom-24 right-6 w-[350px] sm:w-[400px] h-[550px] max-h-[80vh] bg-[var(--card)] rounded-2xl shadow-2xl border border-[var(--border)] flex flex-col overflow-hidden transition-all duration-300 origin-bottom-right z-50"
  [class.scale-0]="!isOpen"
  [class.opacity-0]="!isOpen"
  [class.scale-100]="isOpen"
  [class.opacity-100]="isOpen">
  
  <!-- Header -->
  <div class="bg-[var(--primary)] p-4 text-[var(--primary-foreground)] flex items-center shadow-md z-10">
    <div class="bg-white/20 p-2 rounded-full mr-3 backdrop-blur-sm">
      <mat-icon class="block" style="color: inherit">auto_awesome</mat-icon>
    </div>
    <div>
      <h3 class="font-bold m-0 leading-tight">AI Assistant</h3>
      <p class="text-xs m-0 opacity-80">Always here to help</p>
    </div>
  </div>

  <!-- Messages Area -->
  <div #chatContainer class="flex-1 overflow-y-auto p-4 bg-[var(--muted)] flex flex-col gap-4">
    <div *ngFor="let msg of messages" 
         class="max-w-[85%] rounded-2xl px-4 py-3 shadow-sm text-sm"
         [ngClass]="msg.role === 'user'
           ? 'bg-[var(--primary)] text-[var(--primary-foreground)] self-end rounded-tr-sm'
           : 'bg-[var(--card)] border border-[var(--border)] text-[var(--foreground)] self-start rounded-tl-sm'">
      
      <!-- User message -->
      <ng-container *ngIf="msg.role === 'user'">
        {{ msg.content }}
      </ng-container>

      <!-- AI message (Markdown parsed) -->
      <ng-container *ngIf="msg.role === 'model'">
        <div class="prose prose-sm max-w-none" [innerHTML]="msg.content" *ngIf="msg.isHtml"></div>
        <span *ngIf="!msg.isHtml">{{ msg.content }}</span>
      </ng-container>
    </div>

    <!-- Loading indicator -->
    <div *ngIf="isLoading" class="bg-[var(--card)] border border-[var(--border)] text-[var(--muted-foreground)] self-start rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center">
      <div class="flex gap-1">
        <span class="w-2 h-2 bg-[var(--primary)] rounded-full animate-bounce delay-0"></span>
        <span class="w-2 h-2 bg-[var(--primary)] rounded-full animate-bounce delay-150"></span>
        <span class="w-2 h-2 bg-[var(--primary)] rounded-full animate-bounce delay-300"></span>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="px-4 py-2 bg-[var(--muted)] overflow-x-auto flex gap-2 no-scrollbar border-t border-[var(--border)]" *ngIf="messages.length < 3 && !isLoading">
    <button *ngFor="let suggestion of suggestions" class="whitespace-nowrap text-xs bg-[var(--card)] border border-[var(--border)] text-[var(--foreground)] px-3 py-1.5 rounded-full hover:bg-[var(--accent)] hover:border-[var(--border)] transition-colors" (click)="useSuggestion(suggestion)">
      {{ suggestion }}
    </button>
  </div>

  <!-- Input Area -->
  <div class="p-3 bg-[var(--card)] border-t border-[var(--border)]">
    <form (ngSubmit)="sendMessage()" class="flex items-center gap-2 bg-[var(--muted)] rounded-full p-1 border border-transparent focus-within:border-[var(--ring)] focus-within:bg-[var(--input-background)] transition-colors">
      <input 
        type="text" 
        [(ngModel)]="newMessage" 
        name="message"
        placeholder="Type your message..." 
        class="flex-1 bg-transparent border-none px-4 py-2 text-sm focus:outline-none focus:ring-0 text-[var(--foreground)] placeholder:text-[var(--muted-foreground)]"
        [disabled]="isLoading"
        autocomplete="off"
      >
      <button 
        type="submit" 
        [disabled]="!newMessage.trim() || isLoading"
        class="bg-[var(--primary)] text-[var(--primary-foreground)] w-8 h-8 rounded-full flex items-center justify-center disabled:opacity-50 disabled:bg-[var(--muted-foreground)] transition-colors hover:opacity-90">
        <mat-icon class="text-[18px] w-[18px] h-[18px]">arrow_upward</mat-icon>
      </button>
    </form>
  </div>
</div>
</ng-container>
