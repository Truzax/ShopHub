<div class="product-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Product' : 'Add Product' }}</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="product-form">
        
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" placeholder="Product name">
          <mat-error *ngIf="productForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Price</mat-label>
          <input matInput type="number" formControlName="price" placeholder="Product price">
          <mat-error *ngIf="productForm.get('price')?.hasError('required')">Price is required</mat-error>
          <mat-error *ngIf="productForm.get('price')?.hasError('min')">Price must be positive</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Category</mat-label>
          <input matInput formControlName="category" placeholder="Product category">
          <mat-error *ngIf="productForm.get('category')?.hasError('required')">Category is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Stock</mat-label>
          <input matInput type="number" formControlName="stock" placeholder="Product stock">
          <mat-error *ngIf="productForm.get('stock')?.hasError('required')">Stock is required</mat-error>
          <mat-error *ngIf="productForm.get('stock')?.hasError('min')">Stock must be positive</mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="productForm.invalid">
            {{ isEditMode ? 'Update' : 'Create' }}
          </button>
          <a mat-button routerLink="/products">Cancel</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
