<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1>Reset Password</h1>
      <p>Enter your email to receive a password reset link</p>
    </div>

    <div class="auth-card-content">
      @if (message) {
        <div class="text-center space-y-4 py-4">
          <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto" style="background-color:#d1fae5;">
            <mat-icon style="color:#059669;font-size:2rem;width:2rem;height:2rem;">check</mat-icon>
          </div>
          <p class="text-sm whitespace-pre-wrap" style="color:var(--muted-foreground);">{{ message }}</p>
        </div>
      }

      @if (error) {
        <div class="p-3 mb-4 rounded-lg text-sm" style="background-color:#fee2e2;color:#991b1b;">{{ error }}</div>
      }

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="ref-label" for="forgot-email">Email</label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput id="forgot-email" type="email" formControlName="email" placeholder="you@example.com" />
          </mat-form-field>
        </div>

        <button mat-raised-button type="submit" [disabled]="forgotForm.invalid" class="w-full ref-btn ref-btn-primary ref-btn-lg" style="border-radius:calc(var(--radius) - 2px);">
          Send Reset Link
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/login" class="inline-flex items-center gap-2 text-sm hover:underline" style="color:var(--muted-foreground);">
          <mat-icon style="font-size:1rem;width:1rem;height:1rem;">arrow_back</mat-icon>
          Back to login
        </a>
      </div>
    </div>
  </div>
</div>
