<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-900 via-purple-800 to-slate-900">
  <mat-card class="w-full max-w-md rounded-2xl p-6 shadow-xl bg-white/5 text-white">
    <h2 class="text-2xl font-bold mb-2">Reset your password</h2>
    <p class="text-sm text-white/80 mb-4">Enter the email for your account and we'll send a reset link.</p>

    <div>
      @if (message) {
        <p class="p-3 mb-3 rounded bg-emerald-800/30 text-emerald-200 whitespace-pre-wrap">{{ message }}</p>
      } 
    </div>
    <div>
      @if (error) {
        <p class="p-3 mb-3 rounded bg-rose-800/30 text-rose-200 whitespace-pre-wrap">{{ error }}</p>
      }
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-3">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <button mat-raised-button class="w-full py-3 bg-gradient-to-r from-rose-500 via-fuchsia-600 to-indigo-600 text-white font-semibold" type="submit" [disabled]="forgotForm.invalid">Send reset link</button>
    </form>

    <div class="mt-4 text-sm text-white/80">
      <a routerLink="/login" class="text-blue-300 hover:underline">Back to login</a>
    </div>
  </mat-card>
</div>
