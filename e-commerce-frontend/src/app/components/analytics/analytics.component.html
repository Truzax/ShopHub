<div class="p-6 md:p-8 space-y-10 animate-fade-in max-w-7xl mx-auto">
  <!-- Header -->
  <div class="flex flex-col gap-1 pb-2">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900">AI Analytics</h1>
    <p class="text-slate-500 text-lg">Intelligent insights and automated business performance summaries</p>
  </div>

  <ng-container *ngIf="analyticsData$ | async as data; else loading">
    
    <!-- AI Sales Summary Widget -->
    <app-sales-summary></app-sales-summary>
    
    <!-- AI Performance Insights Widget -->
    <app-performance-insights></app-performance-insights>

  </ng-container>

  <!-- Loading -->
  <ng-template #loading>
    <div class="flex flex-col items-center justify-center py-20" *ngIf="!errorMsg">
      <mat-spinner [diameter]="40"></mat-spinner>
      <span class="text-sm mt-4" style="color:var(--muted-foreground);">Processing analytics...</span>
    </div>
  </ng-template>

  <div *ngIf="errorMsg" class="p-4 rounded-lg flex items-center gap-2" style="background-color:#fee2e2;color:#991b1b;">
    <mat-icon>error</mat-icon>
    {{ errorMsg }}
  </div>
</div>
