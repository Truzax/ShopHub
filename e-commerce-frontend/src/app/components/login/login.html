<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <div class="auth-card-content">
      @if (error) {
        <div class="p-3 mb-4 rounded-lg text-sm bg-red-100 text-red-800">{{ error }}</div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="space-y-4">
        <div>
          <label class="ref-label" for="login-email">Email</label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput id="login-email" type="email" formControlName="email" placeholder="you@example.com" (blur)="updateErrorMessages()" />
            @if (loginForm.controls.email.invalid) {
              <mat-error>{{ emailErrorMessage() }}</mat-error>
            }
          </mat-form-field>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="ref-label mb-0" for="login-password">Password</label>
            <a class="text-sm cursor-pointer hover:underline text-[var(--primary)]" (click)="router.navigate(['/forgot-password'])">Forgot password?</a>
          </div>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput id="login-password" [type]="hide() ? 'password' : 'text'" formControlName="password" placeholder="••••••••" (blur)="updateErrorMessages()" />
            <button type="button" mat-icon-button matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Toggle password visibility'">
              <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            @if (loginForm.controls.password.invalid) {
              <mat-error>{{ passwordErrorMessage() }}</mat-error>
            }
          </mat-form-field>
        </div>

        <button mat-raised-button type="submit" [disabled]="loginForm.invalid" class="w-full ref-btn ref-btn-primary ref-btn-lg rounded-[calc(var(--radius)-2px)]">
          Sign In
        </button>
      </form>
