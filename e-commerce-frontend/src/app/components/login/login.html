<div class="login-container flex items-center justify-center min-h-screen bg-gray-600">
	<mat-card class="login-card w-96 justify-center p-6">
		<mat-card-title class="text-2xl font-bold mb-4 w-full text-center">Sign In</mat-card-title>

		@if (error) {
			<mat-error class="error">{{ error }}</mat-error>
		}

		<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
			<div class="w-full">
				<mat-form-field appearance="outline" class="w-full block mt-4">
					<mat-label>Email</mat-label>
					<input matInput type="email" formControlName="email" (blur)="updateErrorMessages()" />
					@if (loginForm.controls.email.invalid) {
						<mat-error>{{ emailErrorMessage() }}</mat-error>
					}
				</mat-form-field>

				<mat-form-field appearance="outline" class="w-full block mt-4">
    				<mat-label>Password</mat-label>
    				<input matInput [type]="hide() ? 'password' : 'text'" formControlName="password" (blur)="updateErrorMessages()">
					<button
						type="button"
						mat-icon-button
						matSuffix
						(click)="clickEvent($event)"
						[attr.aria-label]="'Hide password'"
						[attr.aria-pressed]="hide()"
					>
						<mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
					</button>
					@if (loginForm.controls.password.invalid) {
						<mat-error>{{ passwordErrorMessage() }}</mat-error>
					}
  				</mat-form-field>
			</div>
			<div class="actions">
				<button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="mt-2 w-full">Login</button>
			</div>

			<div class="mt-3 text-center">Don't have an account? <a (click)="router.navigate(['/signup'])" style="cursor:pointer">Sign up</a></div>
		</form>
	</mat-card>
</div>
